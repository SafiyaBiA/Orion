<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Order Management</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <!-- Leaflet for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=FCMG122HIxrqLa3oR5RXr9rsMHSs65GzUfIozYD_5yM&callback=initMap" async defer></script>
    <script src="script.js"></script>

</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>📦 Order Dashboard</h2>
        <ul>
            <li><a href="#" class="active">📋 Order List</a></li>
            <li><a href="#">📜 Order History</a></li>
            <li><a href="#">⚙️ Settings</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="content">
        <!-- Vehicle Tracking Section -->

        <header class="topbar">
            <h1>🚛 Fleet Order Management</h1>
        </header>

        <!-- Order Form -->
        <section class="order-form">
            <h2>📦 Place an Order</h2>
            <form id="orderForm">
                <div class="input-group">
                    <label for="orderID">Order ID:</label>
                    <input type="text" id="orderID" required>
                </div>

                <div class="input-group">
                    <label for="address">Address:</label>
                    <input type="text" id="address" required>
                </div>

                <div class="input-group">
                    <label for="quantity">Product Quantity:</label>
                    <input type="number" id="quantity" required>
                </div>

                <button type="submit" class="btn-primary">🛒 Place Order</button>
            </form>
        </section>

        <!-- Order History -->
        <section class="order-history">
            <h2>📜 Order History</h2>
            
            
            <!-- Search & Filter -->
            <div class="filters">
                <input type="text" id="searchInput" placeholder="🔍 Search orders...">
                <select id="statusFilter">
                    <option value="All">All</option>
                    <option value="Pending">Pending</option>
                    <option value="Processing">Processing</option>
                    <option value="Shipped">Shipped</option>
                    <option value="Delivered">Delivered</option>
                </select>
            </div>

            <table id="orderTable">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Address</th>
                        <th>Quantity</th>
                        <th>Status</th>
                        <th>Placed On</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <section class="vehicle-status">
                <h2>🚚 Vehicle Status</h2>
                <table id="vehicleTable">
                    <thead>
                        <tr>
                            <th>Vehicle ID</th>
                            <th>Status</th>
                            <th>Current Orders</th>
                            <th>Available Space</th>
                            <th>Can Collect More Orders?</th>
                        </tr>
                    </thead>
                    <tbody id="vehicleTableBody"></tbody>
                </table>
            </section>
            
        </section>

        

        <!-- Order Map -->
        <section class="map-container">
            <h2>🗺 Order Locations</h2>
            <div id="map"></div>
        </section>

    </main>

</body>
</html>
