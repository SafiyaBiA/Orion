<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Map View</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        function initFullScreenMap() {
            const urlParams = new URLSearchParams(window.location.search);
            let locationData = urlParams.get("data");

            try {
                locationData = JSON.parse(decodeURIComponent(locationData));
            } catch (error) {
                console.error("Invalid location data:", error);
                alert("Invalid location data provided!");
                return;
            }

            if (!locationData || locationData.length === 0) {
                alert("No location data available!");
                return;
            }

            // Initialize Google Map
            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 5,
                center: { lat: locationData[0].lat, lng: locationData[0].lng },
            });

            // Add Markers
            locationData.forEach((location) => {
                new google.maps.Marker({
                    map: map,
                    position: { lat: location.lat, lng: location.lng },
                    title: `Order: ${location.id}\nQuantity: ${location.quantity}`,
                });
            });
        }
    </script>

    <!-- ✅ Corrected Google Maps API Key (Replace with your valid one) -->
    <script 
        src="https://maps.googleapis.com/maps/api/js?key=FCMG122HIxrqLa3oR5RXr9rsMHSs65GzUfIozYD_5yM&callback=initFullScreenMap" 
        async defer>
    </script>

</body>
</html>
